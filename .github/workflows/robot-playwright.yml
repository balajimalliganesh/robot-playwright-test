name: RobotFramework with Playwright (Browser lib)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      RF_OUTPUT_DIR: output

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node (for Playwright runtime)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # ❌ remove npm caching to avoid lockfile error

      - name: Initialize robotframework-browser (installs Playwright & browsers)
        run: |
          rfbrowser init
        # If you want only chromium:
        # run: rfbrowser init --browser chromium

      - name: Run Robot tests (headless)
        run: |
          mkdir -p "${RF_OUTPUT_DIR}"
          robot --outputdir "${RF_OUTPUT_DIR}" tests

      - name: Upload Robot artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-artifacts
          path: |
            ${RF_OUTPUT_DIR}/log.html
            ${RF_OUTPUT_DIR}/report.html
            ${RF_OUTPUT_DIR}/output.xml
            ${RF_OUTPUT_DIR}/**/*.png
            ${RF_OUTPUT_DIR}/**/*.webm
          retention-days: 7
